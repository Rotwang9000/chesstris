# Optional: nginx reverse proxy for Jenkins
# Place at /etc/nginx/sites-available/jenkins.conf
# Then:  ln -s /etc/nginx/sites-available/jenkins.conf /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
#
# Only needed if you want to access Jenkins via a subdomain with HTTPS.
# Otherwise, access directly on http://<server-ip>:8090

server {
    server_name jenkins.tetches.com;

    location / {
        proxy_pass http://localhost:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Jenkins needs large headers for CRUMB tokens
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    listen 80;
}
