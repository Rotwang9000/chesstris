server {
	server_name staging.tetches.com;

	# Security headers
	add_header Strict-Transport-Security "max-age=31536000" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "SAMEORIGIN" always;

	# WebSocket / Socket.IO — ^~ ensures this wins over the static-file regex
	location ^~ /socket.io/ {
		proxy_pass http://localhost:3661;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 86400;
	}

	# API calls — proxy to Node.js
	location ^~ /api/ {
		proxy_pass http://localhost:3661;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Static assets — served directly from disk for speed
	location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|json|map)$ {
		root /var/www/tetches.staging/public;
		expires 30d;
		try_files $uri @backend;
	}

	location /static/ {
		alias /var/www/tetches.staging/public/;
		expires 30d;
	}

	# Fallback to Node.js for anything else (SPA routes, etc.)
	location @backend {
		proxy_pass http://localhost:3661;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location / {
		proxy_pass http://localhost:3661;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# SSL — managed by Certbot
	listen 443 ssl;
	ssl_certificate /etc/letsencrypt/live/staging.tetches.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/staging.tetches.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
	if ($host = staging.tetches.com) {
		return 301 https://$host$request_uri;
	}
	listen 80;
	server_name staging.tetches.com;
	return 404;
}
