server {
	server_name tetches.com www.tetches.com;

	# Security headers
	add_header Strict-Transport-Security "max-age=31536000" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "SAMEORIGIN" always;

	# WebSocket / Socket.IO — ^~ ensures this wins over the static-file regex
	location ^~ /socket.io/ {
		proxy_pass http://localhost:3666;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 86400;
	}

	# API calls — proxy to Node.js
	location ^~ /api/ {
		proxy_pass http://localhost:3666;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# JS / CSS / JSON — served from disk for speed but MUST be
	# revalidated every load. The previous `expires 30d` baked
	# stale bundles into players' browsers for a month at a time;
	# they kept seeing old chess piece colours, ad layouts and
	# bug fixes despite us pushing new code. ETag + 304 keeps the
	# bandwidth cost identical for unchanged files.
	location ~ \.(js|mjs|css|json|map)$ {
		root /var/www/tetches.live/public;
		add_header Cache-Control "no-cache, must-revalidate" always;
		expires -1;
		etag on;
		try_files $uri @backend;
	}

	# Long-life binary assets — images / fonts only. These are
	# either hashed in their filename or stable enough that a 7-day
	# cache is fine.
	location ~ \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
		root /var/www/tetches.live/public;
		expires 7d;
		try_files $uri @backend;
	}

	location /static/ {
		alias /var/www/tetches.live/public/;
		expires 7d;
	}

	# Fallback to Node.js for anything else
	location @backend {
		proxy_pass http://localhost:3666;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location / {
		proxy_pass http://localhost:3666;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# SSL — managed by Certbot
	listen 443 ssl;
	ssl_certificate /etc/letsencrypt/live/tetches.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/tetches.com/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
	if ($host = www.tetches.com) {
		return 301 https://$host$request_uri;
	}
	if ($host = tetches.com) {
		return 301 https://$host$request_uri;
	}
	listen 80;
	server_name tetches.com www.tetches.com;
	return 404;
}
