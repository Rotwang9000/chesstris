<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Shaktris - Legacy 2D (Disabled)</title>
	<meta http-equiv="refresh" content="0; url=/?render=cute">
	<style>
		body {
			margin: 0;
			font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
			background: #0b0b0b;
			color: #ffcc00;
			display: grid;
			place-items: center;
			min-height: 100vh;
			text-align: center;
			padding: 24px;
		}
		.card {
			max-width: 520px;
			border: 1px solid rgba(255, 204, 0, 0.4);
			border-radius: 12px;
			padding: 18px 20px;
			background: rgba(0,0,0,0.45);
		}
		a { color: #ffcc00; }
	</style>
</head>
<body>
	<div class="card">
		<h2>Legacy 2D mode has been disabled</h2>
		<p>
			Shaktris now uses the 3D renderer only. You’ll be redirected to the
			<strong>low‑spec “cute”</strong> 3D mode.
		</p>
		<p>If you aren’t redirected automatically, click <a href="/?render=cute">Continue</a>.</p>
	</div>
	<script>
		// JS redirect as a backup in case meta refresh is blocked.
		window.location.replace('/?render=cute');
	</script>
</body>
</html>
