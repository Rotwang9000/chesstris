<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tetches — Legacy 2D Removed</title>
	<style>
		body {
			margin: 0;
			font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
			background: #0b0b0b;
			color: #ffcc00;
			display: grid;
			place-items: center;
			min-height: 100vh;
			text-align: center;
			padding: 24px;
		}
		.card {
			max-width: 520px;
			border: 1px solid rgba(255, 204, 0, 0.4);
			border-radius: 12px;
			padding: 18px 20px;
			background: rgba(0,0,0,0.45);
		}
		a { color: #ffcc00; }
	</style>
</head>
<body>
	<div class="card">
		<h2>Legacy 2D mode has been removed</h2>
		<p>
			Tetches now runs on the 3D renderer only. If your browser can't
			create a WebGL context, please enable hardware acceleration or
			update your graphics driver.
		</p>
		<p><a href="/">Back to the game</a></p>
	</div>
</body>
</html>
