<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Manage Ads — Tetches</title>
	<style>
		:root {
			--bg: #0e0e12;
			--card: #181820;
			--text: #ffffff;
			--text-muted: #999;
			--accent: #ffcc00;
			--good: #4ade80;
			--bad: #ef4444;
			--warn: #f59e0b;
		}
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
			padding: 24px;
		}
		.wrap {
			max-width: 880px;
			margin: 0 auto;
		}
		h1 {
			color: var(--accent);
			margin-bottom: 8px;
		}
		.subtitle {
			color: var(--text-muted);
			margin-bottom: 24px;
		}
		.card {
			background: var(--card);
			border-radius: 12px;
			padding: 24px;
			margin-bottom: 16px;
			border: 1px solid #2a2a35;
		}
		.card h2 {
			color: var(--accent);
			margin-bottom: 16px;
			font-size: 18px;
		}
		button {
			background: linear-gradient(135deg, var(--accent) 0%, #e6b800 100%);
			color: #000;
			border: none;
			padding: 12px 24px;
			border-radius: 8px;
			cursor: pointer;
			font-weight: bold;
			font-size: 15px;
		}
		button:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}
		button.secondary {
			background: #333;
			color: #fff;
		}
		.status-badge {
			display: inline-block;
			padding: 4px 10px;
			border-radius: 12px;
			font-size: 12px;
			font-weight: bold;
			text-transform: uppercase;
		}
		.status-pending { background: rgba(245, 158, 11, 0.2); color: var(--warn); border: 1px solid var(--warn); }
		.status-review  { background: rgba(255, 204, 0, 0.2); color: var(--accent); border: 1px solid var(--accent); }
		.status-active  { background: rgba(74, 222, 128, 0.2); color: var(--good); border: 1px solid var(--good); }
		.status-rejected { background: rgba(239, 68, 68, 0.2); color: var(--bad); border: 1px solid var(--bad); }
		.advertiser {
			border-top: 1px solid #2a2a35;
			padding-top: 16px;
			margin-top: 16px;
		}
		.advertiser:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
		.field-row {
			display: flex;
			justify-content: space-between;
			margin: 6px 0;
			font-size: 14px;
		}
		.field-row .k { color: var(--text-muted); }
		.field-row .v { color: var(--text); font-weight: 500; }
		.ad-thumb {
			max-width: 120px;
			max-height: 120px;
			border-radius: 6px;
			margin-top: 12px;
			background: #000;
		}
		.error { color: var(--bad); margin-top: 8px; font-size: 14px; }
		.muted { color: var(--text-muted); font-size: 13px; }
		.revise-form {
			margin-top: 16px;
			padding: 16px;
			background: rgba(255,255,255,0.03);
			border-radius: 8px;
		}
		.revise-form input[type=text],
		.revise-form input[type=url],
		.revise-form input[type=file] {
			width: 100%;
			padding: 10px;
			background: #0e0e12;
			color: #fff;
			border: 1px solid #333;
			border-radius: 6px;
			margin: 8px 0;
		}
		.toolbar {
			display: flex;
			gap: 12px;
			align-items: center;
			margin-top: 12px;
			flex-wrap: wrap;
		}
		code {
			font-family: 'SF Mono', Monaco, Consolas, monospace;
			background: #0e0e12;
			padding: 2px 6px;
			border-radius: 4px;
		}
		.back-link { color: var(--accent); text-decoration: none; }
		.back-link:hover { text-decoration: underline; }
	</style>
</head>
<body>
	<div class="wrap">
		<a class="back-link" href="/advertise.html">← Back to ad registration</a>
		<h1 style="margin-top: 16px;">Manage my ads</h1>
		<p class="subtitle">Sign in with the Solana wallet you used to pay. We never touch your funds — we only verify the signature.</p>

		<div class="card" id="signin-card">
			<h2>Wallet sign-in</h2>
			<p class="muted">Connect your wallet, then sign a one-off message to prove ownership. No transaction is broadcast.</p>
			<div class="toolbar">
				<button id="connect-btn">Connect wallet</button>
				<button id="signin-btn" disabled>Sign in</button>
				<span id="wallet-pubkey" class="muted"></span>
			</div>
			<div id="signin-error" class="error"></div>
		</div>

		<div class="card" id="ads-card" style="display: none;">
			<h2>Your advertisers</h2>
			<div id="ads-list">
				<p class="muted">Loading…</p>
			</div>
		</div>
	</div>

	<script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
	<script>
	(function() {
		const signinCard = document.getElementById('signin-card');
		const adsCard = document.getElementById('ads-card');
		const adsList = document.getElementById('ads-list');
		const connectBtn = document.getElementById('connect-btn');
		const signinBtn = document.getElementById('signin-btn');
		const walletPubkey = document.getElementById('wallet-pubkey');
		const signinError = document.getElementById('signin-error');

		const state = {
			provider: null,
			address: null,
			token: null,
		};

		function showError(msg) {
			signinError.textContent = msg || '';
		}

		async function connectWallet() {
			showError('');
			const provider = window.solana || window.phantom?.solana;
			if (!provider || !provider.isPhantom) {
				showError('No Solana wallet found. Install Phantom to continue.');
				return;
			}
			try {
				const resp = await provider.connect();
				state.provider = provider;
				state.address = resp.publicKey.toString();
				walletPubkey.textContent = state.address;
				connectBtn.textContent = 'Wallet connected';
				connectBtn.disabled = true;
				signinBtn.disabled = false;
			} catch (err) {
				showError(`Wallet connect failed: ${err.message}`);
			}
		}

		async function signIn() {
			showError('');
			signinBtn.disabled = true;
			try {
				const challengeRes = await fetch('/api/wallet-auth/challenge', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ address: state.address }),
				});
				const challenge = await challengeRes.json();
				if (!challenge.success) throw new Error(challenge.message || 'Challenge failed');

				const encoded = new TextEncoder().encode(challenge.message);
				const signed = await state.provider.signMessage(encoded, 'utf8');
				const sigBytes = signed?.signature || signed;
				const base58 = base58Encode(sigBytes);

				const verifyRes = await fetch('/api/wallet-auth/verify', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ address: state.address, signature: base58 }),
				});
				const verify = await verifyRes.json();
				if (!verify.success) throw new Error(verify.message || 'Verification failed');

				state.token = verify.token;
				signinCard.style.display = 'none';
				adsCard.style.display = 'block';
				await loadMyAds();
			} catch (err) {
				showError(`Sign-in failed: ${err.message}`);
				signinBtn.disabled = false;
			}
		}

		async function loadMyAds() {
			adsList.innerHTML = '<p class="muted">Loading…</p>';
			try {
				const res = await fetch('/api/advertisers/mine', {
					headers: { Authorization: `Bearer ${state.token}` },
				});
				const data = await res.json();
				if (!data.success) throw new Error(data.message || 'Failed to load');
				const list = data.advertisers || [];
				if (list.length === 0) {
					adsList.innerHTML = '<p class="muted">No ads registered for this wallet yet. <a class="back-link" href="/advertise.html">Register one</a>.</p>';
					return;
				}
				adsList.innerHTML = list.map(renderAdvertiser).join('');
				bindReviseHandlers();
			} catch (err) {
				adsList.innerHTML = `<p class="error">${err.message}</p>`;
			}
		}

		function statusBadge(status) {
			const map = {
				pending: ['status-pending', 'Awaiting payment'],
				pending_review: ['status-review', 'Awaiting review'],
				active: ['status-active', 'Live'],
				rejected: ['status-rejected', 'Rejected'],
			};
			const [cls, label] = map[status] || ['status-pending', status];
			return `<span class="status-badge ${cls}">${label}</span>`;
		}

		function renderAdvertiser(adv) {
			const canRevise = adv.bidStatus === 'rejected';
			const reviseUi = canRevise ? `
				<div class="revise-form">
					<strong style="color: var(--bad);">Rejection reason:</strong>
					<div class="muted" style="margin: 6px 0 12px;">${escapeHtml(adv.rejectionReason || 'No reason supplied.')}</div>
					<form data-revise="${adv.id}" enctype="multipart/form-data">
						<label class="muted">New ad text (max 64 chars)</label>
						<input type="text" name="adText" maxlength="64" value="${escapeHtml(adv.adText || '')}">
						<label class="muted">Landing URL</label>
						<input type="url" name="adLink" value="${escapeHtml(adv.adLink || '')}">
						<label class="muted">New artwork (optional — leave empty to keep current)</label>
						<input type="file" name="adImage" accept="image/jpeg,image/png,image/gif,image/webp">
						<button type="submit" style="margin-top: 12px;">Re-submit for review</button>
						<div class="error" data-revise-error></div>
					</form>
				</div>
			` : '';

			const thumb = adv.adImage
				? `<img class="ad-thumb" src="${escapeHtml(adv.adImage)}" alt="ad">`
				: '<p class="muted" style="margin-top: 8px;">Image not yet on disk — only published after approval.</p>';

			return `
				<div class="advertiser">
					<div style="display: flex; justify-content: space-between; align-items: center;">
						<h3>${escapeHtml(adv.name || 'Untitled')}</h3>
						${statusBadge(adv.bidStatus)}
					</div>
					<div class="field-row"><span class="k">Advertiser ID</span><span class="v"><code>${adv.id}</code></span></div>
					<div class="field-row"><span class="k">Ad text</span><span class="v">${escapeHtml(adv.adText || '')}</span></div>
					<div class="field-row"><span class="k">Landing</span><span class="v">${escapeHtml(adv.adLink || '')}</span></div>
					<div class="field-row"><span class="k">Bid</span><span class="v">${adv.bidAmount} SOL / ${adv.cellCount} cells</span></div>
					${thumb}
					${reviseUi}
				</div>
			`;
		}

		function bindReviseHandlers() {
			document.querySelectorAll('form[data-revise]').forEach((form) => {
				form.addEventListener('submit', async (e) => {
					e.preventDefault();
					const id = form.dataset.revise;
					const errorEl = form.querySelector('[data-revise-error]');
					errorEl.textContent = '';
					const data = new FormData(form);
					try {
						const res = await fetch(`/api/advertisers/${id}/revise`, {
							method: 'POST',
							headers: { Authorization: `Bearer ${state.token}` },
							body: data,
						});
						const result = await res.json();
						if (!result.success) throw new Error(result.message || 'Revise failed');
						await loadMyAds();
					} catch (err) {
						errorEl.textContent = err.message;
					}
				});
			});
		}

		function escapeHtml(s) {
			return String(s ?? '').replace(/[&<>"']/g, (c) =>
				({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]
			);
		}

		// Tiny base58 encoder so we don't drag a UMD bundle in.
		// Bitcoin/Solana alphabet, BigInt for safety on long inputs.
		function base58Encode(bytes) {
			const ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
			if (!bytes || bytes.length === 0) return '';
			let n = 0n;
			for (let i = 0; i < bytes.length; i++) n = (n << 8n) + BigInt(bytes[i]);
			let out = '';
			while (n > 0n) {
				const rem = n % 58n;
				n = n / 58n;
				out = ALPHABET[Number(rem)] + out;
			}
			for (let i = 0; i < bytes.length && bytes[i] === 0; i++) out = '1' + out;
			return out;
		}

		connectBtn.addEventListener('click', connectWallet);
		signinBtn.addEventListener('click', signIn);
	})();
	</script>
</body>
</html>
