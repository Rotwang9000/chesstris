<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Advertiser Dashboard - Tetches Admin</title>
	
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
		
		:root {
			--bg: #0a0a0f;
			--bg-card: #14141f;
			--border: #2a2a3a;
			--gold: #ffcc00;
			--text: #e0e0e0;
			--text-muted: #888;
			--success: #4ade80;
			--warning: #fbbf24;
			--error: #f87171;
		}
		
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		
		body {
			font-family: 'Inter', sans-serif;
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
		}
		
		.container {
			max-width: 1400px;
			margin: 0 auto;
			padding: 24px;
		}
		
		header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 32px;
			padding-bottom: 20px;
			border-bottom: 1px solid var(--border);
		}
		
		h1 {
			color: var(--gold);
			font-size: 28px;
		}
		
		.header-actions {
			display: flex;
			gap: 12px;
		}
		
		.btn {
			padding: 10px 20px;
			border: none;
			border-radius: 6px;
			font-size: 14px;
			font-weight: 500;
			cursor: pointer;
			transition: all 0.2s;
		}
		
		.btn-primary {
			background: var(--gold);
			color: #000;
		}
		
		.btn-primary:hover {
			transform: translateY(-1px);
			box-shadow: 0 4px 12px rgba(255, 204, 0, 0.3);
		}
		
		.btn-secondary {
			background: var(--bg-card);
			color: var(--text);
			border: 1px solid var(--border);
		}
		
		.btn-secondary:hover {
			border-color: var(--gold);
		}
		
		.stats-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
			gap: 20px;
			margin-bottom: 32px;
		}
		
		.stat-card {
			background: var(--bg-card);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 20px;
		}
		
		.stat-label {
			color: var(--text-muted);
			font-size: 14px;
			margin-bottom: 8px;
		}
		
		.stat-value {
			font-size: 32px;
			font-weight: 700;
			color: var(--gold);
		}
		
		.stat-change {
			font-size: 12px;
			margin-top: 4px;
		}
		
		.stat-change.positive {
			color: var(--success);
		}
		
		.stat-change.negative {
			color: var(--error);
		}
		
		.card {
			background: var(--bg-card);
			border: 1px solid var(--border);
			border-radius: 12px;
			overflow: hidden;
		}
		
		.card-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px;
			border-bottom: 1px solid var(--border);
		}
		
		.card-title {
			font-size: 18px;
			font-weight: 600;
		}
		
		table {
			width: 100%;
			border-collapse: collapse;
		}
		
		th, td {
			padding: 16px 20px;
			text-align: left;
			border-bottom: 1px solid var(--border);
		}
		
		th {
			font-size: 12px;
			text-transform: uppercase;
			letter-spacing: 0.5px;
			color: var(--text-muted);
			font-weight: 500;
		}
		
		tr:hover {
			background: rgba(255, 204, 0, 0.05);
		}
		
		.status-badge {
			display: inline-block;
			padding: 4px 10px;
			border-radius: 4px;
			font-size: 12px;
			font-weight: 500;
		}
		
		.status-active {
			background: rgba(74, 222, 128, 0.15);
			color: var(--success);
		}
		
		.status-pending {
			background: rgba(251, 191, 36, 0.15);
			color: var(--warning);
		}
		
		.status-expired {
			background: rgba(248, 113, 113, 0.15);
			color: var(--error);
		}
		
		.status-paused {
			background: rgba(136, 136, 136, 0.15);
			color: var(--text-muted);
		}
		
		.actions-cell {
			display: flex;
			gap: 8px;
		}
		
		.action-btn {
			padding: 6px 12px;
			font-size: 12px;
			border-radius: 4px;
			border: 1px solid var(--border);
			background: transparent;
			color: var(--text-muted);
			cursor: pointer;
			transition: all 0.2s;
		}
		
		.action-btn:hover {
			border-color: var(--gold);
			color: var(--gold);
		}
		
		.action-btn.danger:hover {
			border-color: var(--error);
			color: var(--error);
		}
		
		.empty-state {
			text-align: center;
			padding: 60px 20px;
			color: var(--text-muted);
		}
		
		.empty-state h3 {
			margin-bottom: 8px;
			color: var(--text);
		}
		
		.loading {
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 60px;
		}
		
		.spinner {
			width: 40px;
			height: 40px;
			border: 3px solid var(--border);
			border-top-color: var(--gold);
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}
		
		@keyframes spin {
			to { transform: rotate(360deg); }
		}
		
		.modal {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.8);
			display: none;
			justify-content: center;
			align-items: center;
			z-index: 1000;
		}
		
		.modal.active {
			display: flex;
		}
		
		.modal-content {
			background: var(--bg-card);
			border: 1px solid var(--border);
			border-radius: 12px;
			width: 500px;
			max-width: 90%;
			max-height: 80vh;
			overflow-y: auto;
		}
		
		.modal-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px;
			border-bottom: 1px solid var(--border);
		}
		
		.modal-close {
			background: none;
			border: none;
			color: var(--text-muted);
			font-size: 24px;
			cursor: pointer;
		}
		
		.modal-close:hover {
			color: var(--gold);
		}
		
		.modal-body {
			padding: 20px;
		}
		
		.ad-preview {
			display: flex;
			gap: 16px;
			align-items: flex-start;
			margin-bottom: 20px;
		}
		
		.ad-preview img {
			width: 100px;
			height: 100px;
			object-fit: cover;
			border-radius: 8px;
			border: 1px solid var(--border);
		}
		
		.ad-details {
			flex: 1;
		}
		
		.ad-name {
			font-size: 18px;
			font-weight: 600;
			color: var(--gold);
			margin-bottom: 4px;
		}
		
		.ad-text {
			color: var(--text-muted);
			font-size: 14px;
		}
		
		.info-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 16px;
		}
		
		.info-item {
			background: rgba(0, 0, 0, 0.2);
			padding: 12px;
			border-radius: 6px;
		}
		
		.info-label {
			font-size: 12px;
			color: var(--text-muted);
			margin-bottom: 4px;
		}
		
		.info-value {
			font-size: 16px;
			font-weight: 500;
		}
		
		.modal-footer {
			display: flex;
			justify-content: flex-end;
			gap: 12px;
			padding: 20px;
			border-top: 1px solid var(--border);
		}
	</style>
</head>
<body>
	<div class="container">
		<header>
			<h1>Advertiser Dashboard</h1>
			<div class="header-actions">
				<a href="/" class="btn btn-secondary">← Back to Game</a>
				<button class="btn btn-primary" onclick="refreshData()">Refresh</button>
			</div>
		</header>
		
		<!-- Stats Grid -->
		<div class="stats-grid" id="stats-grid">
			<div class="stat-card">
				<div class="stat-label">Total Advertisers</div>
				<div class="stat-value" id="stat-total">-</div>
			</div>
			<div class="stat-card">
				<div class="stat-label">Active Campaigns</div>
				<div class="stat-value" id="stat-active">-</div>
			</div>
			<div class="stat-card">
				<div class="stat-label">Total Impressions</div>
				<div class="stat-value" id="stat-impressions">-</div>
			</div>
			<div class="stat-card">
				<div class="stat-label">Total Clicks</div>
				<div class="stat-value" id="stat-clicks">-</div>
			</div>
			<div class="stat-card">
				<div class="stat-label">Total Revenue (SOL)</div>
				<div class="stat-value" id="stat-revenue">-</div>
			</div>
		</div>
		
		<!-- Pending Review Queue -->
		<div class="card" id="pending-review-card">
			<div class="card-header">
				<span class="card-title">Awaiting moderator review</span>
				<span id="pending-count" style="color: var(--warning); font-size: 14px;"></span>
			</div>
			<div id="pending-container">
				<div class="loading"><div class="spinner"></div></div>
			</div>
		</div>

		<!-- Advertisers Table -->
		<div class="card">
			<div class="card-header">
				<span class="card-title">All Advertisers</span>
			</div>
			<div id="advertisers-container">
				<div class="loading">
					<div class="spinner"></div>
				</div>
			</div>
		</div>
	</div>
	
	<!-- Detail Modal -->
	<div class="modal" id="detail-modal">
		<div class="modal-content">
			<div class="modal-header">
				<span class="card-title">Advertiser Details</span>
				<button class="modal-close" onclick="closeModal()">&times;</button>
			</div>
			<div class="modal-body" id="modal-body">
				<!-- Content populated by JS -->
			</div>
			<div class="modal-footer">
				<button class="btn btn-secondary" onclick="closeModal()">Close</button>
			</div>
		</div>
	</div>
	
	<script>
		let advertisers = [];

		// Admin token is supplied via URL query string when this page
		// is loaded (the page handler in `server/app.js` validates it
		// before serving). We thread the same token through every API
		// call so the gated `/api/advertisers` endpoints accept us.
		const ADMIN_TOKEN = new URLSearchParams(window.location.search).get('adminToken') || '';
		const adminHeaders = ADMIN_TOKEN ? { 'x-admin-token': ADMIN_TOKEN } : {};

		async function fetchAdvertisers() {
			try {
				const response = await fetch('/api/advertisers', { headers: adminHeaders });
				const data = await response.json();

				if (data.success && data.advertisers) {
					advertisers = data.advertisers;
					updateStats();
					renderTable();
				} else {
					showEmptyState('No advertisers found');
				}
			} catch (error) {
				console.error('Error fetching advertisers:', error);
				showEmptyState('Failed to load advertisers');
			}

			await fetchPendingQueue();
		}

		async function fetchPendingQueue() {
			const container = document.getElementById('pending-container');
			const countEl = document.getElementById('pending-count');
			try {
				const res = await fetch('/api/advertisers/admin/pending', { headers: adminHeaders });
				const data = await res.json();
				const list = (data && data.advertisers) || [];
				countEl.textContent = list.length === 0 ? 'queue empty' : `${list.length} waiting`;
				if (list.length === 0) {
					container.innerHTML = '<div class="empty-state"><p>Nothing waiting — go play some Tetches.</p></div>';
					return;
				}
				container.innerHTML = list.map(renderPendingCard).join('');
			} catch (err) {
				container.innerHTML = `<div class="empty-state"><p>Failed to load pending queue: ${err.message}</p></div>`;
			}
		}

		function renderPendingCard(adv) {
			const previewUrl = adv.previewUrl ? adv.previewUrl : '';
			const previewTag = previewUrl
				? `<img src="${escapeHtml(previewUrl)}" alt="pending ad" style="width:160px;height:160px;object-fit:contain;border:1px solid var(--border);border-radius:8px;background:#000;">`
				: '<p class="text-muted">No image attached.</p>';
			return `
				<div style="display:flex;gap:16px;padding:16px;border-top:1px solid var(--border);">
					${previewTag}
					<div style="flex:1;">
						<h3 style="color:var(--gold);">${escapeHtml(adv.name)}</h3>
						<p style="color:var(--text-muted);font-size:13px;margin:6px 0;">${escapeHtml(adv.adText || '')}</p>
						<p style="font-size:12px;"><strong>Link:</strong> <a href="${escapeHtml(adv.adLink || '#')}" target="_blank" rel="noopener" style="color:var(--gold);">${escapeHtml(adv.adLink || '')}</a></p>
						<p style="font-size:12px;"><strong>Bid:</strong> ${adv.bidAmount} SOL · ${adv.cellCount} cells</p>
						<p style="font-size:12px;"><strong>Wallet:</strong> <code>${escapeHtml(adv.walletAddress || '')}</code></p>
						<p style="font-size:12px;"><strong>ID:</strong> <code>${adv.id}</code></p>
						<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
							<button class="btn btn-primary" onclick="reviewAd('${adv.id}','approve')">Approve</button>
							<button class="btn btn-secondary" onclick="reviewAdWithReason('${adv.id}')">Reject…</button>
						</div>
					</div>
				</div>
			`;
		}

		async function reviewAd(id, action, reason) {
			try {
				const res = await fetch(`/api/advertisers/${id}/admin-review`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json', ...adminHeaders },
					body: JSON.stringify({ action, reason: reason || '' }),
				});
				const data = await res.json();
				if (!data.success) throw new Error(data.message || 'Review failed');
				await fetchAdvertisers();
			} catch (err) {
				alert(`Review failed: ${err.message}`);
			}
		}

		function reviewAdWithReason(id) {
			const reason = window.prompt('Rejection reason (the advertiser will see this — be specific so they can fix it):', 'Content does not meet our all-ages guideline.');
			if (reason === null) return;
			reviewAd(id, 'reject', reason);
		}
		
		function updateStats() {
			const total = advertisers.length;
			const active = advertisers.filter(a => a.bidStatus === 'active').length;
			const impressions = advertisers.reduce((sum, a) => sum + (a.impressions || 0), 0);
			const clicks = advertisers.reduce((sum, a) => sum + (a.clicks || 0), 0);
			const revenue = advertisers.reduce((sum, a) => sum + (a.bidAmount || 0), 0);
			
			document.getElementById('stat-total').textContent = total;
			document.getElementById('stat-active').textContent = active;
			document.getElementById('stat-impressions').textContent = formatNumber(impressions);
			document.getElementById('stat-clicks').textContent = formatNumber(clicks);
			document.getElementById('stat-revenue').textContent = revenue.toFixed(4);
		}
		
		function formatNumber(num) {
			if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
			if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
			return num.toString();
		}
		
		function renderTable() {
			if (advertisers.length === 0) {
				showEmptyState('No advertisers registered yet');
				return;
			}
			
			const html = `
				<table>
					<thead>
						<tr>
							<th>Name</th>
							<th>Status</th>
							<th>Bid (SOL)</th>
							<th>Cells</th>
							<th>Impressions</th>
							<th>Clicks</th>
							<th>CTR</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						${advertisers.map(ad => `
							<tr>
								<td>${escapeHtml(ad.name)}</td>
								<td><span class="status-badge status-${ad.bidStatus}">${ad.bidStatus}</span></td>
								<td>${ad.bidAmount}</td>
								<td>${ad.cellsSponsored || 0} / ${ad.cellCount}</td>
								<td>${formatNumber(ad.impressions || 0)}</td>
								<td>${formatNumber(ad.clicks || 0)}</td>
								<td>${calculateCTR(ad)}</td>
								<td class="actions-cell">
									<button class="action-btn" onclick="viewDetails('${ad.id}')">View</button>
									<button class="action-btn" onclick="toggleStatus('${ad.id}')">${ad.bidStatus === 'paused' ? 'Resume' : 'Pause'}</button>
									<button class="action-btn danger" onclick="deleteAdvertiser('${ad.id}')">Delete</button>
								</td>
							</tr>
						`).join('')}
					</tbody>
				</table>
			`;
			
			document.getElementById('advertisers-container').innerHTML = html;
		}
		
		function calculateCTR(ad) {
			if (!ad.impressions || ad.impressions === 0) return '0%';
			return ((ad.clicks / ad.impressions) * 100).toFixed(2) + '%';
		}
		
		function showEmptyState(message) {
			document.getElementById('advertisers-container').innerHTML = `
				<div class="empty-state">
					<h3>${message}</h3>
					<p>Advertisers will appear here once they register.</p>
				</div>
			`;
		}
		
		function escapeHtml(text) {
			const div = document.createElement('div');
			div.textContent = text;
			return div.innerHTML;
		}
		
		function viewDetails(id) {
			const ad = advertisers.find(a => a.id === id);
			if (!ad) return;
			
			document.getElementById('modal-body').innerHTML = `
				<div class="ad-preview">
					<img src="${ad.adImage || '/img/placeholder.png'}" alt="${escapeHtml(ad.name)}">
					<div class="ad-details">
						<div class="ad-name">${escapeHtml(ad.name)}</div>
						<div class="ad-text">${escapeHtml(ad.adText || '')}</div>
					</div>
				</div>
				<div class="info-grid">
					<div class="info-item">
						<div class="info-label">Status</div>
						<div class="info-value">${ad.bidStatus}</div>
					</div>
					<div class="info-item">
						<div class="info-label">Bid Amount</div>
						<div class="info-value">${ad.bidAmount} SOL</div>
					</div>
					<div class="info-item">
						<div class="info-label">Cell Count</div>
						<div class="info-value">${ad.cellCount}</div>
					</div>
					<div class="info-item">
						<div class="info-label">Cost per Cell</div>
						<div class="info-value">${(ad.bidAmount / ad.cellCount).toFixed(6)} SOL</div>
					</div>
					<div class="info-item">
						<div class="info-label">Cells Sponsored</div>
						<div class="info-value">${ad.cellsSponsored || 0}</div>
					</div>
					<div class="info-item">
						<div class="info-label">Remaining</div>
						<div class="info-value">${ad.cellCount - (ad.cellsSponsored || 0)}</div>
					</div>
					<div class="info-item">
						<div class="info-label">Impressions</div>
						<div class="info-value">${ad.impressions || 0}</div>
					</div>
					<div class="info-item">
						<div class="info-label">Clicks</div>
						<div class="info-value">${ad.clicks || 0}</div>
					</div>
					<div class="info-item">
						<div class="info-label">Click-Through Rate</div>
						<div class="info-value">${calculateCTR(ad)}</div>
					</div>
					<div class="info-item">
						<div class="info-label">Email</div>
						<div class="info-value" style="font-size: 12px;">${escapeHtml(ad.email || 'N/A')}</div>
					</div>
					<div class="info-item" style="grid-column: span 2;">
						<div class="info-label">Landing URL</div>
						<div class="info-value" style="font-size: 12px; word-break: break-all;">${escapeHtml(ad.adLink || 'N/A')}</div>
					</div>
					<div class="info-item" style="grid-column: span 2;">
						<div class="info-label">Created</div>
						<div class="info-value">${ad.createdAt ? new Date(ad.createdAt).toLocaleString() : 'N/A'}</div>
					</div>
				</div>
			`;
			
			document.getElementById('detail-modal').classList.add('active');
		}
		
		function closeModal() {
			document.getElementById('detail-modal').classList.remove('active');
		}
		
		async function toggleStatus(id) {
			const ad = advertisers.find(a => a.id === id);
			if (!ad) return;

			const newStatus = ad.bidStatus === 'paused' ? 'active' : 'paused';

			try {
				const response = await fetch(`/api/advertisers/${id}`, {
					method: 'PUT',
					headers: { 'Content-Type': 'application/json', ...adminHeaders },
					body: JSON.stringify({ bidStatus: newStatus }),
				});

				const data = await response.json();
				if (data.success) {
					fetchAdvertisers();
				} else {
					alert('Failed to update status: ' + (data.message || 'Unknown error'));
				}
			} catch (error) {
				console.error('Error updating status:', error);
				alert('Failed to update status');
			}
		}

		async function deleteAdvertiser(id) {
			if (!confirm('Are you sure you want to delete this advertiser?')) return;

			try {
				const response = await fetch(`/api/advertisers/${id}`, {
					method: 'DELETE',
					headers: adminHeaders,
				});

				const data = await response.json();
				if (data.success) {
					fetchAdvertisers();
				} else {
					alert('Failed to delete: ' + (data.message || 'Unknown error'));
				}
			} catch (error) {
				console.error('Error deleting advertiser:', error);
				alert('Failed to delete advertiser');
			}
		}
		
		function refreshData() {
			document.getElementById('advertisers-container').innerHTML = `
				<div class="loading">
					<div class="spinner"></div>
				</div>
			`;
			fetchAdvertisers();
		}
		
		// Close modal on escape key
		document.addEventListener('keydown', (e) => {
			if (e.key === 'Escape') closeModal();
		});
		
		// Close modal on backdrop click
		document.getElementById('detail-modal').addEventListener('click', (e) => {
			if (e.target.classList.contains('modal')) closeModal();
		});
		
		// Initial load
		fetchAdvertisers();
	</script>
</body>
</html>
