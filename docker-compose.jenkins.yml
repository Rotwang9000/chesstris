services:
  jenkins:
    build:
      context: ./ci
      dockerfile: Dockerfile.jenkins
    container_name: tetches-jenkins
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      # Jenkins home — persists config, jobs, plugins between restarts
      - jenkins_home:/var/jenkins_home

      # Deployment target directories on the host
      - /var/www/tetches.staging:/var/www/tetches.staging
      - /var/www/tetches.live:/var/www/tetches.live

      # Deploy trigger directory (Jenkins writes, host cron reads)
      - /var/www/.deploy-triggers:/var/www/.deploy-triggers

    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true

volumes:
  jenkins_home:
